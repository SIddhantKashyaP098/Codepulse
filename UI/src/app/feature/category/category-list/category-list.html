<div class="container">
  <h1 class="mt-3">Category List</h1>
  <div class="d-flex justify-content-end mt-3">
    <a [routerLink]="['/admin', 'categories', 'add']" class="btn btn-primary">Add Category</a>
  </div>

  <div>
    @if (isLoading()) {
      <p>Loading...</p>
    } @else {
      @if (isError()) {
        <p>There has been an Error ...</p>
      } @else {
        <table class="table table-bordered mt-3">
          <thead>
            <tr>
              <th>Id</th>
              <th>Name</th>
              <th>Url Handle</th>
              <th>Edit</th>
            </tr>
          </thead>
          <tbody>
            @for (i of value(); track i.id) {
              <tr>
                <td>{{ i.id }}</td>
                <td>{{ i.name }}</td>
                <td>{{ i.urlHandle }}</td>
                <td>
                  <a class="btn btn-light" [routerLink]="['/admin/categories/edit', i.id]">Edit</a>
                </td>
              </tr>
            }
          </tbody>
        </table>
      }
    }
  </div>
</div>
